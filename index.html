<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>球隊每週球聚登記系統 - 週五場</title>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #0f172a;
      --text-light: #64748b;
      --border: #e2e8f0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 20px 10px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    .card {
      background: var(--card-bg);
      border-radius: 16px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }
    
    @media (max-width: 600px) {
      body { padding: 10px 5px; }
      .card { padding: 16px; border-radius: 12px; margin-bottom: 12px; }
    }
    
    .form-card {
      max-width: 600px;
      margin: 0 auto 20px;
    }
    h2 { font-size: 24px; margin-bottom: 16px; text-align: center; color: #4f46e5; font-weight: 700; }
    .status-msg {
      background: #f1f5f9;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      border-left: 4px solid var(--primary);
    }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-weight: 700; font-size: 16px; margin-bottom: 8px; }
    input[type="text"], select {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
    }
    .radio-group {
      display: flex;
      gap: 20px;
      margin-top: 6px;
    }
    .radio-label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
    }
    button {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: var(--primary-hover); }
    button:disabled { background: #cbd5e1; cursor: not-allowed; }
    
    .columns-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    
    @media (max-width: 768px) {
      .columns-container {
        grid-template-columns: 1fr;
        gap: 0px;
      }
    }
    
    .list-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 12px;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 4px;
    }
    
    @media (max-width: 600px) {
      .list-title { font-size: 14px; }
    }

    ul { list-style: none; }
    li {
      background: #f8fafc;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 8px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .player-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .identity-tag {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 4px;
      color: white;
      font-weight: 500;
      white-space: nowrap;
    }
